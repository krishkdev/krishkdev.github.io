  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

adding:26px 28px; border-right:1px solid #E4E2D9;\"><div style=\"font-family:'Newsreader',serif; font-size:30px; font-weight:600;\">70%<\u002Fdiv><div style=\"font-size:13.5px; color:#76736a; margin-top:4px;\">faster reporting delivered<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:26px 28px; border-right:1px solid #E4E2D9;\"><div style=\"font-family:'Newsreader',serif; font-size:30px; font-weight:600;\">100+<\u002Fdiv><div style=\"font-size:13.5px; color:#76736a; margin-top:4px;\">global users supported<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:26px 28px;\"><div style=\"font-family:'Newsreader',serif; font-size:30px; font-weight:600;\">9,000+<\u002Fdiv><div style=\"font-size:13.5px; color:#76736a; margin-top:4px;\">leads scored &amp; ranked<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- services -->\n    <div style=\"padding:72px 56px 20px; max-width:1240px; margin:0 auto;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:34px;\">\n        <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:38px; letter-spacing:-0.01em; margin:0;\">What I build for you<\u002Fh2>\n        <span style=\"font-family:'Geist',sans-serif; font-size:12.5px; color:#8a8576; letter-spacing:0.08em;\">/ SERVICES<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px;\">\n        <div style=\"background:#FFFFFF; border:1px solid #E4E2D9; border-radius:16px; padding:34px 32px;\">\n          <div style=\"font-family:'Geist',sans-serif; font-size:12.5px; letter-spacing:0.14em; color:#233657; margin-bottom:16px;\">01<\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:23px; margin:0 0 12px; color:#1A1916;\">RAG systems &amp; pipelines<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.65; color:#56544c; margin:0; text-wrap:pretty;\">Production retrieval-augmented generation end to end — vector search with FAISS or Pinecone, RAGAS evaluation, safety guardrails, and low-latency inference your team can rely on.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; border:1px solid #E4E2D9; border-radius:16px; padding:34px 32px;\">\n          <div style=\"font-family:'Geist',sans-serif; font-size:12.5px; letter-spacing:0.14em; color:#233657; margin-bottom:16px;\">02<\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:23px; margin:0 0 12px; color:#1A1916;\">AI agents &amp; LLM apps<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.65; color:#56544c; margin:0; text-wrap:pretty;\">Agentic workflows and LLM-powered applications built with LangChain — from a working prototype to a deployed product, with the orchestration and tooling to back it.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; border:1px solid #E4E2D9; border-radius:16px; padding:34px 32px;\">\n          <div style=\"font-family:'Geist',sans-serif; font-size:12.5px; letter-spacing:0.14em; color:#233657; margin-bottom:16px;\">03<\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:23px; margin:0 0 12px; color:#1A1916;\">ML models &amp; data products<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.65; color:#56544c; margin:0; text-wrap:pretty;\">Predictive modeling, EDA, and statistical analysis that drive measurable business outcomes — scikit-learn and PyTorch models scoped to the decision they inform.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; border:1px solid #E4E2D9; border-radius:16px; padding:34px 32px;\">\n          <div style=\"font-family:'Geist',sans-serif; font-size:12.5px; letter-spacing:0.14em; color:#233657; margin-bottom:16px;\">04<\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:23px; margin:0 0 12px; color:#1A1916;\">Backend &amp; cloud deployment<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.65; color:#56544c; margin:0; text-wrap:pretty;\">Containerized microservices and REST APIs on GCP Cloud Run and Docker — the production plumbing that gets models off the laptop and into reliable service.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- selected work -->\n    <div style=\"padding:72px 56px 20px; max-width:1240px; margin:0 auto;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:34px;\">\n        <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:38px; letter-spacing:-0.01em; margin:0;\">Selected work<\u002Fh2>\n        <span style=\"font-family:'Geist',sans-serif; font-size:12.5px; color:#8a8576; letter-spacing:0.08em;\">/ CASE STUDIES<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- flagship -->\n      <a href=\"https://github.com/krishkdev/RecruitIQ-chatbot\" target=\"_blank\" class=\"lnk\" style=\"display:block; background:#FFFFFF; border:1px solid #E4E2D9; border-radius:16px; padding:42px 44px; margin-bottom:20px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:18px;\">\n          <span style=\"font-family:'Geist',sans-serif; font-size:11.5px; letter-spacing:0.14em; text-transform:uppercase; color:#fff; background:#233657; padding:5px 11px; border-radius:5px;\">Flagship<\u002Fspan>\n          <span style=\"font-family:'Geist',sans-serif; font-size:12.5px; color:#8a8576;\">RAG · LangChain · FAISS · Groq · RAGAS · Streamlit<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:32px; letter-spacing:-0.01em; margin:0 0 14px; color:#1A1916;\">RecruitIQ : RAG recruitment assistant<\u002Fh3>\n        <p style=\"font-size:17px; line-height:1.6; color:#56544c; max-width:62em; margin:0 0 26px; text-wrap:pretty;\">An AI candidate-screening platform: semantic resume-to-job-description matching, recruiter Q&amp;A, and skill-gap analysis over FAISS vector indexes. Groq LLM inference for low-latency responses, safety guardrails, and retrieval quality measured end-to-end with RAGAS.<\u002Fp>\n        <div style=\"display:flex; gap:46px; flex-wrap:wrap;\">\n          <div><div style=\"font-family:'Newsreader',serif; font-size:24px; font-weight:600;\">Semantic match<\u002Fdiv><div style=\"font-size:13px; color:#76736a; margin-top:3px;\">resume ↔ JD over FAISS<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'Newsreader',serif; font-size:24px; font-weight:600;\">Low latency<\u002Fdiv><div style=\"font-size:13px; color:#76736a; margin-top:3px;\">Groq inference<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'Newsreader',serif; font-size:24px; font-weight:600;\">Guardrailed<\u002Fdiv><div style=\"font-size:13px; color:#76736a; margin-top:3px;\">+ RAGAS evaluation<\u002Fdiv><\u002Fdiv>\n          <div style=\"margin-left:auto; align-self:center; font-family:'Geist',sans-serif; font-size:13px; color:#233657;\">View on GitHub →<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- two secondary -->\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px;\">\n        <a href=\"https://github.com/krishkdev/Lead-Scoring\" target=\"_blank\" class=\"lnk\" style=\"display:block; background:#FFFFFF; border:1px solid #E4E2D9; border-radius:16px; padding:34px 32px;\">\n          <div style=\"font-family:'Geist',sans-serif; font-size:12px; color:#8a8576; margin-bottom:14px;\">Python · scikit-learn · EDA · Stats<\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:24px; margin:0 0 12px; color:#1A1916;\">Lead Scoring : conversion prediction<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#56544c; margin:0 0 18px; text-wrap:pretty;\">Logistic-regression model scoring 9,000+ leads by conversion likelihood for an edtech company, full EDA, feature engineering, and ROC-AUC, precision-recall evaluat
